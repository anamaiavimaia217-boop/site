    }

    }

    }

      border-radius: 8px;
      cursor: pointer;
      text-align: left;

      background: rgba(255, 255, 255, 0.25);
    }

    .botao-proximo, .botao-voltar {
      width: 100%;
      background: #00c2ff;
      color: #06111f;
      font-weight: bold;
      cursor: pointer;
      margin-top: 15px;
    }

    .barra {
      width: 100%;
      height: 18px;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      overflow: hidden;
      margin: 15px 0;
    }

    .progressoBarra {
      height: 100%;
      width: 0%;
      background: #00c2ff;
    }

    #progresso {
      text-align: center;
      font-weight: bold;
    }

    .resultado-caixa {
      text-align: center;
      font-size: 20px;
    }

    .pequeno {
      text-align: center;
      opacity: 0.85;
    }

    table {

      border-collapse: collapse;
      margin-top: 15px;
      background: rgba(255,255,255,0.12);

    th, td {

      padding: 8px;
      font-size: 14px;
    }

    th {
      background: rgba(0,194,255,0.35);

        padding: 20px;
      }

</head>
<body>

    <div id="quiz" style="display:none;">
      <h2 id="bloco"></h2>
      <p id="progresso"></p>
      <p id="tempo">Tempo: 0s</p>
      <div class="barra">
        <div id="progressoBarra" class="progressoBarra"></div>
      </div>

      <h3 id="pergunta"></h3>

];

let indice = 0;
let pontos = 0;
let nomeJogador = "";
let perguntasDoBloco = [];
let inicioTempo = 0;
let intervaloTempo = null;
let blocoAtual = "";

function formatarTempo(segundos) {
  const minutos = Math.floor(segundos / 60);
  const resto = segundos % 60;

  if (minutos === 0) {
    return resto + "s";
  }

  return minutos + "min " + resto + "s";
}

function atualizarTempo() {
  const agora = Date.now();
  const segundos = Math.floor((agora - inicioTempo) / 1000);
  document.getElementById("tempo").innerText = "Tempo: " + formatarTempo(segundos);
}

function embaralhar(lista) {
  const copia = [...lista];

  for (let i = copia.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const temp = copia[i];
    copia[i] = copia[j];
    copia[j] = temp;
  }

  return copia;
}

function iniciarBlocoAleatorio() {
  const blocos = [...new Set(perguntas.map(q => q.bloco))];
  const blocoSorteado = blocos[Math.floor(Math.random() * blocos.length)];
  iniciarQuiz(blocoSorteado);
}

function iniciarPerguntasAleatorias() {
  nomeJogador = document.getElementById("nome").value.trim();
  if (nomeJogador === "") {
    alert("Digite seu nome para começar o quiz.");
    return;
  }

  let quantidade = Number(document.getElementById("quantidadeAleatoria").value);

  if (!quantidade || quantidade < 1) {
    alert("Digite uma quantidade válida de perguntas.");
    return;
  }

  if (quantidade > perguntas.length) {
    quantidade = perguntas.length;
  }

  blocoAtual = "Perguntas aleatórias";
  perguntasDoBloco = embaralhar(perguntas).slice(0, quantidade);

  indice = 0;
  pontos = 0;

  inicioTempo = Date.now();
  clearInterval(intervaloTempo);
  intervaloTempo = setInterval(atualizarTempo, 1000);
  atualizarTempo();

  document.getElementById("inicio").style.display = "none";
  document.getElementById("quiz").style.display = "block";
  mostrarPergunta();
}

function iniciarQuiz(blocoEscolhido) {
  nomeJogador = document.getElementById("nome").value.trim();
  if (nomeJogador === "") {
    alert("Digite seu nome para começar o quiz.");
    return;
  }

  blocoAtual = blocoEscolhido;
  perguntasDoBloco = perguntas.filter(q => q.bloco === blocoEscolhido);

  indice = 0;
  pontos = 0;

  inicioTempo = Date.now();
  clearInterval(intervaloTempo);
  intervaloTempo = setInterval(atualizarTempo, 1000);
  atualizarTempo();

  document.getElementById("inicio").style.display = "none";
  document.getElementById("quiz").style.display = "block";
  mostrarPergunta();
}

function mostrarPergunta() {
  const q = perguntasDoBloco[indice];

  if (blocoAtual === "Perguntas aleatórias") {
    document.getElementById("bloco").innerText = "Modo: Perguntas aleatórias | Tema: " + q.bloco;
  } else {
    document.getElementById("bloco").innerText = "Bloco: " + q.bloco;
  }
  document.getElementById("progresso").innerText = "Pergunta " + (indice + 1) + " de " + perguntasDoBloco.length;
  document.getElementById("pergunta").innerText = q.pergunta;

  const porcentagem = ((indice) / perguntasDoBloco.length) * 100;
  document.getElementById("progressoBarra").style.width = porcentagem + "%";

  const div = document.getElementById("alternativas");
  div.innerHTML = "";

  for (let i = 0; i < q.alternativas.length; i++) {
    div.innerHTML += `
      <label class="alternativa">
        <input type="radio" name="resposta" value="${i}">
        ${String.fromCharCode(65 + i)}) ${q.alternativas[i]}
      </label>
    `;
  }
}

function proximaPergunta() {
  const marcada = document.querySelector('input[name="resposta"]:checked');

  if (!marcada) {
    alert("Escolha uma alternativa antes de continuar.");
    return;
  }

  const resposta = Number(marcada.value);

  if (resposta === perguntasDoBloco[indice].correta) {
    pontos++;
  }

  indice++;

  if (indice < perguntasDoBloco.length) {
    mostrarPergunta();
  } else {
    mostrarResultado();
  }
}

function mostrarResultado() {
  clearInterval(intervaloTempo);
  const tempoFinal = Math.floor((Date.now() - inicioTempo) / 1000);

  document.getElementById("quiz").style.display = "none";
  document.getElementById("resultado").style.display = "block";
  document.getElementById("progressoBarra").style.width = "100%";

  salvarResultado(nomeJogador, blocoAtual, pontos, perguntasDoBloco.length, tempoFinal);

  let mensagem = "";
  if (pontos >= 9) {
    mensagem = "Excelente!";
  } else if (pontos >= 6) {
    mensagem = "Muito bom!";
  } else {
    mensagem = "Continue praticando!";
  }

  document.getElementById("textoResultado").innerText =
    nomeJogador + ", você acertou " + pontos + " de " + perguntasDoBloco.length +
    " perguntas. Tempo total: " + formatarTempo(tempoFinal) + ".";

  document.getElementById("mensagemResultado").innerText = mensagem;
}


function salvarResultado(nome, bloco, acertos, total, tempoSegundos) {
  const resultados = JSON.parse(localStorage.getItem("resultadosQuizFuturo") || "[]");

  const agora = new Date();
  const horario = agora.toLocaleString("pt-BR");

  resultados.push({
    nome: nome,
    horario: horario,
    bloco: bloco,
    acertos: acertos,
    total: total,
    tempo: formatarTempo(tempoSegundos)
  });

  localStorage.setItem("resultadosQuizFuturo", JSON.stringify(resultados));
}


function reiniciar() {
  clearInterval(intervaloTempo);
  indice = 0;
  pontos = 0;
  perguntasDoBloco = [];
  document.getElementById("resultado").style.display = "none";
  document.getElementById("inicio").style.display = "block";
}




</script>

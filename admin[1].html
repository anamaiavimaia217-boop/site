<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Admin - Quiz do Futuro</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #101936, #243b73);
      margin: 0;
      padding: 0;
      color: white;
    }
    .container {
      max-width: 1100px;
      margin: 35px auto;
      background: rgba(255, 255, 255, 0.10);
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }
    h1, h2 { text-align: center; }
    button {
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      margin: 8px;
      background: #00c2ff;
      color: #06111f;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { background: #66ddff; }
    .botoes { text-align: center; margin-bottom: 15px; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      background: rgba(255,255,255,0.12);
    }
    th, td {
      border: 1px solid rgba(255,255,255,0.25);
      padding: 8px;
      font-size: 14px;
      text-align: center;
    }
    th { background: rgba(0,194,255,0.35); }
    .pequeno { text-align: center; opacity: 0.85; }
    .aviso {
      background: rgba(255,255,255,0.12);
      padding: 12px;
      border-radius: 10px;
      text-align: center;
    }
    @media (max-width: 700px) {
      .container { margin: 10px; padding: 15px; }
      th, td { padding: 5px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Área do Administrador</h1>
    <p class="pequeno">Resultados salvos online no Firebase.</p>

    <div class="botoes">
      <button onclick="carregarResultados()">Atualizar resultados</button>
      <button onclick="baixarCSV()">Baixar CSV</button>
      <button onclick="location.href='index.html'">Abrir quiz</button>
    </div>

    <div id="status" class="aviso">Carregando...</div>
    <div id="resumo"></div>
    <div id="tabelaResultados"></div>
  </div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>

const firebaseConfig = {
  apiKey: "AIzaSyAQa01JldZB_4qRkqcMyaDw2PbQ6avkuY8",
  authDomain: "local-storage-5edf9.firebaseapp.com",
  projectId: "local-storage-5edf9",
  storageBucket: "local-storage-5edf9.firebasestorage.app",
  messagingSenderId: "701733020913",
  appId: "1:701733020913:web:fff6cf9e72e1aa92a07550",
  measurementId: "G-GZR05M50FP"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let resultadosGlobais = [];

async function carregarResultados() {
  const status = document.getElementById("status");
  const div = document.getElementById("tabelaResultados");
  const resumo = document.getElementById("resumo");
  status.innerText = "Carregando resultados...";
  div.innerHTML = "";
  resumo.innerHTML = "";

  try {
    const snapshot = await db.collection("resultados").orderBy("criadoEm", "desc").get();
    resultadosGlobais = [];
    snapshot.forEach((doc) => resultadosGlobais.push(doc.data()));

    if (resultadosGlobais.length === 0) {
      status.innerText = "Nenhum resultado registrado ainda.";
      return;
    }

    let somaAcertos = 0;
    let somaTempo = 0;
    for (let r of resultadosGlobais) {
      somaAcertos += Number(r.acertos || 0);
      somaTempo += Number(r.tempoSegundos || 0);
    }

    const mediaAcertos = (somaAcertos / resultadosGlobais.length).toFixed(1);
    const mediaTempo = formatarTempo(Math.round(somaTempo / resultadosGlobais.length));

    status.innerText = "Resultados carregados.";
    resumo.innerHTML = "<h2>Total: " + resultadosGlobais.length +
      " | Média de acertos: " + mediaAcertos +
      " | Tempo médio: " + mediaTempo + "</h2>";

    let tabela = `
      <table>
        <tr>
          <th>Horário</th>
          <th>Nome</th>
          <th>Bloco</th>
          <th>Acertos</th>
          <th>Tempo</th>
        </tr>
    `;

    for (let r of resultadosGlobais) {
      tabela += `
        <tr>
          <td>${r.horario || ""}</td>
          <td>${r.nome || ""}</td>
          <td>${r.bloco || ""}</td>
          <td>${r.acertos || 0}/${r.total || 0}</td>
          <td>${r.tempo || ""}</td>
        </tr>
      `;
    }

    tabela += "</table>";
    div.innerHTML = tabela;
  } catch (erro) {
    status.innerText = "Erro ao carregar resultados. Verifique as regras do Firestore.";
    console.error(erro);
  }
}

function formatarTempo(segundos) {
  const minutos = Math.floor(segundos / 60);
  const resto = segundos % 60;
  if (minutos === 0) return resto + "s";
  return minutos + "min " + resto + "s";
}

function baixarCSV() {
  if (resultadosGlobais.length === 0) {
    alert("Não há resultados para baixar.");
    return;
  }

  let csv = "Horario,Nome,Bloco,Acertos,Total,Tempo\n";
  for (let r of resultadosGlobais) {
    csv += `"${r.horario || ""}","${r.nome || ""}","${r.bloco || ""}",${r.acertos || 0},${r.total || 0},"${r.tempo || ""}"\n`;
  }

  const arquivo = new Blob([csv], { type: "text/csv;charset=utf-8" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(arquivo);
  link.download = "resultados_quiz.csv";
  link.click();
}

window.carregarResultados = carregarResultados;
window.baixarCSV = baixarCSV;
carregarResultados();
</script>
</body>
</html>

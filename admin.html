<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Admin - Quiz do Futuro</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #101936, #243b73);
      margin: 0;
      padding: 0;
      color: white;
    }

    .container {
      max-width: 1000px;
      margin: 35px auto;
      background: rgba(255, 255, 255, 0.10);
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h1, h2 {
      text-align: center;
    }

    button, input {
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      margin: 8px 0;
    }

    button {
      background: #00c2ff;
      color: #06111f;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #66ddff;
    }

    .botoes {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 15px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      background: rgba(255,255,255,0.12);
    }

    th, td {
      border: 1px solid rgba(255,255,255,0.25);
      padding: 8px;
      font-size: 14px;
      text-align: center;
    }

    th {
      background: rgba(0,194,255,0.35);
    }

    .pequeno {
      text-align: center;
      opacity: 0.85;
    }

    a {
      color: #66ddff;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Área do Administrador</h1>
    <p class="pequeno">Esta página mostra os resultados salvos pelo quiz no mesmo navegador/site.</p>

    <div class="botoes">
      <button onclick="mostrarTabelaResultados()">Atualizar resultados</button>
      <button onclick="baixarCSV()">Baixar CSV</button>
      <button onclick="limparResultados()">Limpar resultados</button>
      <button onclick="location.href='quiz.html'">Abrir quiz</button>
    </div>

    <div id="resumo"></div>
    <div id="tabelaResultados"></div>
  </div>

<script>
function formatarResultados() {
  return JSON.parse(localStorage.getItem("resultadosQuizFuturo") || "[]");
}

function mostrarTabelaResultados() {
  const resultados = formatarResultados();
  const div = document.getElementById("tabelaResultados");
  const resumo = document.getElementById("resumo");

  if (resultados.length === 0) {
    resumo.innerHTML = "";
    div.innerHTML = "<p class='pequeno'>Nenhum resultado registrado ainda.</p>";
    return;
  }

  let totalTentativas = resultados.length;
  let somaAcertos = 0;

  for (let r of resultados) {
    somaAcertos += Number(r.acertos);
  }

  let media = (somaAcertos / totalTentativas).toFixed(1);
  resumo.innerHTML = "<h2>Total de tentativas: " + totalTentativas + " | Média de acertos: " + media + "</h2>";

  let tabela = `
    <table>
      <tr>
        <th>Horário</th>
        <th>Nome</th>
        <th>Bloco</th>
        <th>Acertos</th>
        <th>Tempo</th>
      </tr>
  `;

  for (let r of resultados) {
    tabela += `
      <tr>
        <td>${r.horario}</td>
        <td>${r.nome}</td>
        <td>${r.bloco}</td>
        <td>${r.acertos}/${r.total}</td>
        <td>${r.tempo}</td>
      </tr>
    `;
  }

  tabela += "</table>";
  div.innerHTML = tabela;
}

function limparResultados() {
  const confirmar = confirm("Tem certeza que deseja apagar todos os resultados?");
  if (confirmar) {
    localStorage.removeItem("resultadosQuizFuturo");
    mostrarTabelaResultados();
  }
}

function baixarCSV() {
  const resultados = formatarResultados();

  if (resultados.length === 0) {
    alert("Não há resultados para baixar.");
    return;
  }

  let csv = "Horario,Nome,Bloco,Acertos,Total,Tempo\n";

  for (let r of resultados) {
    csv += `"${r.horario}","${r.nome}","${r.bloco}",${r.acertos},${r.total},"${r.tempo}"\n`;
  }

  const arquivo = new Blob([csv], { type: "text/csv;charset=utf-8" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(arquivo);
  link.download = "resultados_quiz.csv";
  link.click();
}

mostrarTabelaResultados();
</script>
</body>
</html>
